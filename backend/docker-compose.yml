services:
  app:
    build: .
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - app_network

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app_network

  node:
    profiles: ["dev"]
    image: node:latest
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - app_network

  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: valar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: valar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - app_network

networks:
  app_network:

volumes:
  pgdata:
