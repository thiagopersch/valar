<div class="flex! flex-col! justify-center! items-center! h-screen! overflow-hidden!">
  <app-card
    [title]="'Login'"
    [apparence]="'outlined'"
    [showActions]="true"
    class="lg:max-w-4xl! md:max-w-lg! w-full!"
  >
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex! flex-col! gap-4!">
      @if (isLoading()) {
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
      }

      <mat-form-field appearance="fill" class="w-full!">
        <mat-label>E-mail</mat-label>
        <input matInput type="email" formControlName="email" required />
        <mat-error> {{ loginForm.get('email') | errorMessage }} </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-full!">
        <mat-label>Password</mat-label>
        <input
          matInput
          [type]="hidePassword() ? 'password' : 'text'"
          formControlName="password"
          required
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hidePassword.set(!hidePassword())"
          [attr.aria-label]="'Hide password'"
          [attr.aria-pressed]="hidePassword()"
        >
          <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error> {{ loginForm.get('password') | errorMessage }} </mat-error>
      </mat-form-field>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        class="rounded-lg!"
        [disabled]="isLoading() || loginForm.invalid"
      >
        {{ isLoading() ? 'Autenticando...' : 'Acessar' }}
      </button>
    </form>
  </app-card>
</div>
