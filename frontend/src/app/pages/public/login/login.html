<div class="flex flex-col justify-center items-center h-screen overflow-hidden">
  <app-card
    [title]="'Login'"
    [apparence]="'outlined'"
    [showActions]="true"
    class="lg:max-w-4xl md:max-w-lg w-full"
  >
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      @if (isLoading()) {
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
      }

      @if (errorMessage()) {
        <div class="bg-red-100 border border-red-400 text-red-700 rounded relative" role="alert">
          <span class="block sm:inline">{{ errorMessage() }}</span>
        </div>
      }

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>E-mail</mat-label>
        <input matInput type="email" formControlName="email" required />
        <mat-error> E-mail is required </mat-error>
      </mat-form-field>
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Password</mat-label>
        <input
          matInput
          [type]="hidePassword() ? 'password' : 'text'"
          formControlName="password"
          required
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hidePassword.set(!hidePassword())"
          [attr.aria-label]="'Hide password'"
          [attr.aria-pressed]="hidePassword()"
        >
          <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error> Password is required </mat-error>
      </mat-form-field>
      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="isLoading() || loginForm.invalid"
      >
        {{ isLoading() ? 'Autenticando...' : 'Acessar' }}
      </button>
    </form>
  </app-card>
</div>
