<div class="h-full flex flex-col p-6 w-full gap-4">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold">Atividades de Serviços</h1>
    <button mat-flat-button color="primary" (click)="onAdd()">Adicionar Atividade</button>
  </div>

  <app-crud
    [fields]="activities()"
    [columnDefinitions]="columns"
    [actions]="actions"
    [length]="total()"
    [isLoading]="isLoading()"
  ></app-crud>
</div>
