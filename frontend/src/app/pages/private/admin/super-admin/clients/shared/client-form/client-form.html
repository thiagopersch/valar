<form [formGroup]="form" class="w-full h-full p-2 flex flex-col">
  <mat-tab-group class="flex-1" mat-stretch-tabs="false" dynamicHeight>
    <mat-tab label="Identificação">
      <app-identification-tab [form]="form" [implementationTypes]="IMPLEMENTATION_TYPES" />
    </mat-tab>

    <mat-tab label="Identidade visual">
      <app-visual-identity-tab [form]="form" [initialPreviews]="initialPreviews" />
    </mat-tab>

    <mat-tab label="Responsáveis">
      <app-responsibles-tab [form]="form" [users]="users" [analystTypes]="ANALYST_TYPES" />
    </mat-tab>

    <mat-tab label="Contrato">
      <app-contract-tab [form]="form" [levels]="LEVELS" [minDate]="minDate" [maxDate]="maxDate" />
    </mat-tab>

    <mat-tab label="Saúde">
      <app-health-tab
        [form]="form"
        [healthScores]="HEALTH_SCORES"
        [levels]="LEVELS"
        [demandLevels]="DEMAND_LEVELS"
        [priorityLevels]="PRIORITY_LEVELS"
      />
    </mat-tab>

    <mat-tab label="Informações complementares">
      <app-fields-complementary-tab [form]="form" [systems]="systems" />
    </mat-tab>
  </mat-tab-group>

  @if (loading) {
    <div
      class="absolute inset-0 bg-white/60 backdrop-blur-sm z-50 flex flex-col items-center justify-center gap-4 animate-fade-in"
    >
      <div
        class="w-12 h-12 border-4 border-primary-500 border-t-transparent rounded-full animate-spin"
      ></div>
      <span class="text-primary-600 font-medium">Salvando alterações...</span>
    </div>
  }
</form>
