<mat-card class="bg-white!" [class]="customClass()" [appearance]="apparence()">
  @if (title() || subtitle()) {
    <mat-card-header class="flex! flex-col! justify-center! items-center! p-4!">
      @if (title()) {
        <mat-card-title class="py-8!">
          <span
            class="text-center! font-bold! text-[3rem]! max-md:text-[2.5rem]! text-neutral-600! tracking-wider! uppercase!"
          >
            {{ title() }}
          </span>
        </mat-card-title>
      }
      @if (subtitle()) {
        <mat-card-subtitle>{{ subtitle() }}</mat-card-subtitle>
      }
    </mat-card-header>
  }
  <mat-card-content>
    <ng-content></ng-content>
  </mat-card-content>

  @if (showActions()) {
    <mat-card-actions>
      <ng-content select="[actions]"></ng-content>
    </mat-card-actions>
  }
</mat-card>
