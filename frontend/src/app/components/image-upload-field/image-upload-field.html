<div class="flex items-start gap-6 py-8 px-4">
  <!-- Left: label + preview -->
  <div class="flex flex-col gap-3 w-64 shrink-0">
    <span class="text-sm font-semibold text-neutral-800">{{ config.label }}</span>

    <div
      class="flex items-center justify-center bg-white border border-neutral-200 rounded overflow-hidden"
      [ngClass]="config.previewClass ?? 'w-56 h-16'"
    >
      @if (preview) {
        <img
          [src]="preview"
          class="max-w-full max-h-full"
          [style.objectFit]="config.objectFit ?? 'contain'"
          alt="Preview"
        />
      } @else {
        <mat-icon class="text-neutral-300 text-3xl!">image</mat-icon>
      }
    </div>
  </div>

  <!-- Right: actions + hints -->
  <div class="flex flex-col gap-3 flex-1 pt-6">
    <div class="flex items-center gap-2">
      <button
        mat-stroked-button
        class="rounded-lg!"
        type="button"
        [disabled]="isDisabled"
        (click)="triggerInput()"
      >
        Trocar imagem
      </button>

      <button
        mat-button
        color="warn"
        class="rounded-lg!"
        type="button"
        [disabled]="isDisabled"
        (click)="removeFile()"
      >
        Remover
      </button>

      <input
        [id]="config.inputId"
        type="file"
        class="hidden"
        [accept]="config.accept"
        [disabled]="isDisabled"
        (change)="onFileSelected($event)"
      />
    </div>

    <div class="flex flex-col gap-0.5 text-sm text-neutral-500">
      @for (hint of config.hints; track hint; let last = $last) {
        <span [class.font-semibold]="last" [class.text-neutral-700]="last">{{ hint }}</span>
      }
    </div>
  </div>
</div>
